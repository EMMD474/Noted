appId: com.noted.app
productName: Noted
directories:
  output: dist-electron
  buildResources: build
files:
  - .next/standalone
  - .next/static
  - package.json
  - electron
  - public
extraMetadata:
  main: electron/main.js
asar: true
win:
  target:
    - nsis
    - portable
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
    - deb
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
